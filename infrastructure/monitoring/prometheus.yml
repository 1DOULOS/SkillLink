global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'skilllink-monitor'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Auth Service
  - job_name: 'auth-service'
    static_configs:
      - targets: ['auth-service:3001']
    metrics_path: '/metrics'
    scrape_interval: 15s

  # User Service
  - job_name: 'user-service'
    static_configs:
      - targets: ['user-service:3002']
    metrics_path: '/metrics'
    scrape_interval: 15s

  # Job Service
  - job_name: 'job-service'
    static_configs:
      - targets: ['job-service:3003']
    metrics_path: '/metrics'
    scrape_interval: 15s

  # Matching Service (Python/FastAPI)
  - job_name: 'matching-service'
    static_configs:
      - targets: ['matching-service:8000']
    metrics_path: '/metrics'
    scrape_interval: 15s

  # Node exporter (system metrics)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 30s

  # PostgreSQL exporter
  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres-exporter:9187']
    scrape_interval: 30s
