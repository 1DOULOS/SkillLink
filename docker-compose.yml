version: '3.8'

services:
  # ─── Database ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: skilllink-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: skilllink
      POSTGRES_PASSWORD: skilllink123
      POSTGRES_DB: skilllink_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skilllink -d skilllink_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - skilllink-network

  # ─── Cache ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: skilllink-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - skilllink-network

  # ─── Auth Service ────────────────────────────────────────────────────────────
  auth-service:
    build:
      context: ./backend/auth-service
      dockerfile: Dockerfile
    container_name: skilllink-auth
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://skilllink:skilllink123@postgres:5432/skilllink_db
      JWT_SECRET: skilllink-jwt-secret-2026-production
      JWT_REFRESH_SECRET: skilllink-refresh-secret-2026-production
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - skilllink-network

  # ─── User Service ────────────────────────────────────────────────────────────
  user-service:
    build:
      context: ./backend/user-service
      dockerfile: Dockerfile
    container_name: skilllink-users
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      DATABASE_URL: postgresql://skilllink:skilllink123@postgres:5432/skilllink_db
      JWT_SECRET: skilllink-jwt-secret-2026-production
      NODE_ENV: production
      UPLOAD_DIR: /app/uploads
      MAX_FILE_SIZE: 5242880
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3002/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - skilllink-network

  # ─── Job Service ─────────────────────────────────────────────────────────────
  job-service:
    build:
      context: ./backend/job-service
      dockerfile: Dockerfile
    container_name: skilllink-jobs
    restart: unless-stopped
    ports:
      - "3003:3003"
    environment:
      PORT: 3003
      DATABASE_URL: postgresql://skilllink:skilllink123@postgres:5432/skilllink_db
      JWT_SECRET: skilllink-jwt-secret-2026-production
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3003/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - skilllink-network

  # ─── Matching Service (Python/FastAPI) ───────────────────────────────────────
  matching-service:
    build:
      context: ./backend/matching-service
      dockerfile: Dockerfile
    container_name: skilllink-matching
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://skilllink:skilllink123@postgres:5432/skilllink_db
      JWT_SECRET: skilllink-jwt-secret-2026-production
      PORT: 8000
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - skilllink-network

  # ─── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: skilllink-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - auth-service
      - user-service
      - job-service
      - matching-service
    networks:
      - skilllink-network

  # ─── API Gateway (Nginx) ─────────────────────────────────────────────────────
  nginx:
    build:
      context: ./infrastructure/nginx
      dockerfile: Dockerfile
    container_name: skilllink-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - auth-service
      - user-service
      - job-service
      - matching-service
      - frontend
    networks:
      - skilllink-network

  # ─── Node Exporter ───────────────────────────────────────────────────────────
  node-exporter:
    image: prom/node-exporter:latest
    container_name: skilllink-node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - skilllink-network

  # ─── Postgres Exporter ───────────────────────────────────────────────────────
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: skilllink-postgres-exporter
    restart: unless-stopped
    ports:
      - "9187:9187"
    environment:
      DATA_SOURCE_NAME: postgresql://skilllink:skilllink123@postgres:5432/skilllink_db?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - skilllink-network

  # ─── Prometheus ──────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: skilllink-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - skilllink-network

  # ─── Grafana ─────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: skilllink-grafana
    restart: unless-stopped
    ports:
      - "3004:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: skilllink2026
      GF_USERS_ALLOW_SIGN_UP: false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./infrastructure/monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
    networks:
      - skilllink-network

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  prometheus_data:
  grafana_data:

networks:
  skilllink-network:
    driver: bridge
